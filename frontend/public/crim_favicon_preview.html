
<div style="display:flex;align-items:center;gap:32px;padding:24px 0;flex-wrap:wrap">
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
    <div style="background:#050505;border-radius:10px;padding:16px;border:1px solid rgba(255,255,255,0.08)">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64">
        <defs>
          <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0c0e14"/>
            <stop offset="100%" stop-color="#080a0f"/>
          </linearGradient>
          <filter id="f">
            <feGaussianBlur stdDeviation="1.2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <rect width="32" height="32" rx="7" fill="url(#bg)"/>
        <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" fill="none" stroke="rgba(163,230,53,0.2)" stroke-width="1"/>
        <polyline points="5,22 10,18 15,20 20,13 27,9" fill="none" stroke="#a3e635" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#f)"/>
        <polygon points="5,22 10,18 15,20 20,13 27,9 27,26 5,26" fill="#a3e635" fill-opacity="0.07"/>
        <circle cx="27" cy="9" r="2" fill="#a3e635" opacity="0.9"/>
        <circle cx="27" cy="9" r="3.5" fill="#a3e635" fill-opacity="0.2"/>
      </svg>
    </div>
    <span style="font-size:11px;color:var(--color-text-secondary)">64px</span>
  </div>

  <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
    <div style="background:#050505;border-radius:8px;padding:12px;border:1px solid rgba(255,255,255,0.08)">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
        <defs>
          <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0c0e14"/>
            <stop offset="100%" stop-color="#080a0f"/>
          </linearGradient>
        </defs>
        <rect width="32" height="32" rx="7" fill="url(#bg2)"/>
        <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" fill="none" stroke="rgba(163,230,53,0.2)" stroke-width="1"/>
        <polyline points="5,22 10,18 15,20 20,13 27,9" fill="none" stroke="#a3e635" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <polygon points="5,22 10,18 15,20 20,13 27,9 27,26 5,26" fill="#a3e635" fill-opacity="0.07"/>
        <circle cx="27" cy="9" r="2" fill="#a3e635" opacity="0.9"/>
      </svg>
    </div>
    <span style="font-size:11px;color:var(--color-text-secondary)">32px</span>
  </div>

  <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
    <div style="background:#050505;border-radius:6px;padding:10px;border:1px solid rgba(255,255,255,0.08)">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="16" height="16">
        <defs>
          <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0c0e14"/>
            <stop offset="100%" stop-color="#080a0f"/>
          </linearGradient>
        </defs>
        <rect width="32" height="32" rx="7" fill="url(#bg3)"/>
        <polyline points="5,22 10,18 15,20 20,13 27,9" fill="none" stroke="#a3e635" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="27" cy="9" r="2" fill="#a3e635" opacity="0.9"/>
      </svg>
    </div>
    <span style="font-size:11px;color:var(--color-text-secondary)">16px</span>
  </div>

  <!-- Tab mockup -->
  <div style="display:flex;flex-direction:column;align-items:flex-start;gap:8px">
    <span style="font-size:11px;color:var(--color-text-secondary)">browser tab</span>
    <div style="background:#1e1e1e;border-radius:8px 8px 0 0;padding:7px 14px;display:flex;align-items:center;gap:7px;min-width:160px;border:1px solid rgba(255,255,255,0.1)">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="14" height="14">
        <rect width="32" height="32" rx="7" fill="#0c0e14"/>
        <polyline points="5,22 10,18 15,20 20,13 27,9" fill="none" stroke="#a3e635" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="27" cy="9" r="2.5" fill="#a3e635"/>
      </svg>
      <span style="font-size:12px;color:rgba(255,255,255,0.7);font-family:sans-serif">CRIM · Dashboard</span>
    </div>
    <div style="height:3px;background:#2a2a2a;width:100%;border-radius:0 0 2px 2px;border:1px solid rgba(255,255,255,0.06);border-top:none"></div>
  </div>
</div>
